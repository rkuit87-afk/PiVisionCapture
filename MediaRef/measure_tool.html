<title>Fishtail Measure — Working Session</title>
<style>
  :root {
    --bg: #f2efe8;
    --surface: #ffffff;
    --surface-2: #e9e4d8;
    --text: #241f19;
    --muted: #756b5c;
    --border: #d9d0bf;
    --accent: #b5622f;
    --accent-ink: #ffffff;
    --measure: #c0392b;
    --calib: #2f7a52;
    --note: #2a5c8a;
    --shadow: 0 1px 2px rgba(36,31,25,0.06), 0 6px 20px rgba(36,31,25,0.08);
    --font-display: "Bahnschrift", "Segoe UI Semibold", "Segoe UI", system-ui, sans-serif;
    --font-body: "Segoe UI", system-ui, -apple-system, sans-serif;
    --font-mono: "Cascadia Code", "SF Mono", Consolas, "Courier New", monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17191b;
      --surface: #202327;
      --surface-2: #262a2f;
      --text: #eae6dd;
      --muted: #96a09c;
      --border: #33383d;
      --accent: #d97f45;
      --accent-ink: #17191b;
      --measure: #e2564a;
      --calib: #4caf7d;
      --note: #5b9bd9;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
    }
  }
  :root[data-theme="dark"] {
    --bg: #17191b; --surface: #202327; --surface-2: #262a2f; --text: #eae6dd;
    --muted: #96a09c; --border: #33383d; --accent: #d97f45; --accent-ink: #17191b;
    --measure: #e2564a; --calib: #4caf7d; --note: #5b9bd9;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
  }
  :root[data-theme="light"] {
    --bg: #f2efe8; --surface: #ffffff; --surface-2: #e9e4d8; --text: #241f19;
    --muted: #756b5c; --border: #d9d0bf; --accent: #b5622f; --accent-ink: #ffffff;
    --measure: #c0392b; --calib: #2f7a52; --note: #2a5c8a;
    --shadow: 0 1px 2px rgba(36,31,25,0.06), 0 6px 20px rgba(36,31,25,0.08);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: var(--font-body); height: 100%;
  }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-wrap: wrap;
  }
  header h1 {
    font-family: var(--font-display); font-size: 1.15rem; font-weight: 600;
    margin: 0; letter-spacing: 0.01em; white-space: nowrap;
  }
  header .subtitle { color: var(--muted); font-size: 0.8rem; margin-right: auto; }

  .pill {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.3rem 0.65rem; border-radius: 999px; font-size: 0.78rem;
    font-family: var(--font-mono); border: 1px solid var(--border); background: var(--surface-2);
    white-space: nowrap;
  }
  .pill .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; background: var(--muted); flex: none; }
  .pill.ok .dot { background: var(--calib); }

  button, .file-btn {
    font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
    padding: 0.45rem 0.8rem; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text); cursor: pointer;
  }
  button:hover, .file-btn:hover { border-color: var(--accent); }
  button:focus-visible, .file-btn:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  button.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  main {
    flex: 1; display: grid; grid-template-columns: 1fr 320px;
    gap: 1px; background: var(--border); overflow: hidden;
  }
  @media (max-width: 860px) { main { grid-template-columns: 1fr; } }

  .stage {
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    padding: 1rem; overflow: auto; position: relative;
  }
  .canvas-wrap { position: relative; line-height: 0; box-shadow: var(--shadow); }
  canvas { display: block; max-width: 100%; height: auto; cursor: crosshair; border-radius: 2px; }

  aside {
    background: var(--surface); display: flex; flex-direction: column; min-height: 0;
  }
  .tool-row {
    display: flex; gap: 0.4rem; padding: 0.85rem; border-bottom: 1px solid var(--border);
  }
  .tool-row button { flex: 1; }
  .tool-row button[aria-pressed="true"] { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  .calib-box {
    padding: 0.85rem; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .calib-box label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .calib-box .row { display: flex; gap: 0.5rem; align-items: center; }
  .calib-box input[type="number"] {
    width: 100%; padding: 0.4rem 0.5rem; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text); font-family: var(--font-mono); font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  .hint { font-size: 0.74rem; color: var(--muted); line-height: 1.4; }

  .list-head {
    padding: 0.7rem 0.85rem 0.4rem; font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); display: flex; justify-content: space-between;
  }
  .list { flex: 1; overflow-y: auto; padding: 0 0.6rem 0.6rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .item {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.5rem 0.6rem; font-size: 0.82rem; display: flex; flex-direction: column; gap: 0.25rem;
  }
  .item .top-row { display: flex; align-items: center; gap: 0.4rem; }
  .swatch { width: 0.7rem; height: 0.7rem; border-radius: 3px; flex: none; }
  .item .label { font-weight: 600; flex: 1; }
  .item .val { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--muted); font-size: 0.78rem; }
  .item button.del {
    border: none; background: none; color: var(--muted); font-size: 0.9rem; padding: 0 0.2rem; cursor: pointer;
  }
  .item button.del:hover { color: var(--measure); }
  .item .note-text { color: var(--text); font-size: 0.8rem; }
  .empty { padding: 1rem 0.85rem; color: var(--muted); font-size: 0.82rem; line-height: 1.5; }

  footer.actions {
    padding: 0.7rem 0.85rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem;
  }
  footer.actions button { flex: 1; }

  .note-popup {
    position: absolute; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; box-shadow: var(--shadow); padding: 0.5rem; z-index: 10;
    display: flex; gap: 0.4rem;
  }
  .note-popup input {
    font-family: var(--font-body); font-size: 0.82rem; padding: 0.35rem 0.5rem;
    border-radius: 6px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
    width: 180px;
  }
</style>

<header>
  <h1>Fishtail Measure</h1>
  <span class="subtitle">Working session — calibration &amp; defect-length viability</span>
  <span class="pill" id="calibPill"><span class="dot"></span><span id="calibPillText">Not calibrated</span></span>
  <label class="file-btn" for="fileInput">Load image
    <input id="fileInput" type="file" accept="image/*" style="display:none" />
  </label>
  <button id="resetImgBtn">Reset to default frame</button>
</header>

<main>
  <div class="stage">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="stage"></canvas>
    </div>
  </div>

  <aside>
    <div class="tool-row" role="group" aria-label="Tool selection">
      <button id="toolCalib" aria-pressed="false" title="Draw a line over a known real-world length">Calibrate</button>
      <button id="toolLine" aria-pressed="false" title="Measure a length using current calibration">Measure</button>
      <button id="toolNote" aria-pressed="false" title="Drop a note pin">Note</button>
    </div>

    <div class="calib-box">
      <label for="knownLen">Known length for calibration line (mm)</label>
      <div class="row">
        <input type="number" id="knownLen" value="6092" min="1" step="1" />
      </div>
      <div class="hint" id="scaleHint">Draw a line with the "Calibrate" tool over something of known real-world length (e.g. the 6092&nbsp;mm board), then confirm — every "Measure" line after that converts px → mm automatically.</div>
    </div>

    <div class="list-head"><span>Lines &amp; notes</span><span id="itemCount">0</span></div>
    <div class="list" id="list"></div>

    <footer class="actions">
      <button id="undoBtn">Undo last</button>
      <button id="clearBtn">Clear all</button>
    </footer>
  </aside>
</main>

  var canvas = document.getElementById("stage");
  var ctx = canvas.getContext("2d");
  var wrap = document.getElementById("canvasWrap");
  var fileInput = document.getElementById("fileInput");
  var resetImgBtn = document.getElementById("resetImgBtn");
  var list = document.getElementById("list");
  var itemCount = document.getElementById("itemCount");
  var calibPill = document.getElementById("calibPill");
  var calibPillText = document.getElementById("calibPillText");
  var knownLenInput = document.getElementById("knownLen");
  var scaleHint = document.getElementById("scaleHint");

  var toolBtns = {
    calibrate: document.getElementById("toolCalib"),
    measure: document.getElementById("toolLine"),
    note: document.getElementById("toolNote")
  };

  var img = new Image();
  var items = [];          // {type:'calibrate'|'measure'|'note', ax, ay, bx, by, label, pxLen, mmLen, text}
  var pendingPoint = null; // first click of a line
  var tool = "measure";
  var mmPerPx = null;
  var idSeq = 1;

  function setTool(t) {
    tool = t;
    Object.keys(toolBtns).forEach(function (k) {
      toolBtns[k].setAttribute("aria-pressed", k === t ? "true" : "false");
    });
    pendingPoint = null;
    draw();
  }
  toolBtns.calibrate.addEventListener("click", function () { setTool("calibrate"); });
  toolBtns.measure.addEventListener("click", function () { setTool("measure"); });
  toolBtns.note.addEventListener("click", function () { setTool("note"); });

  function loadImage(src) {
    img.onload = function () {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      draw();
    };
    img.src = src;
  }

  fileInput.addEventListener("change", function (e) {
    var f = e.target.files && e.target.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      items = []; mmPerPx = null; updateCalibPill();
      loadImage(ev.target.result);
      renderList();
    };
    reader.readAsDataURL(f);
  });
  resetImgBtn.addEventListener("click", function () {
    items = []; mmPerPx = null; updateCalibPill();
    loadImage(DEFAULT_IMAGE);
    renderList();
  });

  function updateCalibPill() {
    if (mmPerPx) {
      calibPill.classList.add("ok");
      calibPillText.textContent = mmPerPx.toFixed(3) + " mm/px";
      scaleHint.textContent = "Calibrated at " + mmPerPx.toFixed(3) + " mm/px. Draw another \"Calibrate\" line any time to replace it.";
    } else {
      calibPill.classList.remove("ok");
      calibPillText.textContent = "Not calibrated";
      scaleHint.textContent = "Draw a line with the \"Calibrate\" tool over something of known real-world length (e.g. the 6092 mm board), then confirm — every \"Measure\" line after that converts px → mm automatically.";
    }
  }

  function pxDist(ax, ay, bx, by) {
    return Math.sqrt((bx - ax) * (bx - ay ? bx - ax : bx - ax) + 0); // placeholder unused
  }
  function dist(ax, ay, bx, by) {
    return Math.sqrt((bx - ax) * (bx - ax) + (by - ay) * (by - ay));
  }

  function draw() {
    if (!img.src) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);

    items.forEach(function (it) {
      if (it.type === "note") {
        drawPin(it.ax, it.ay, it.label, colorFor("note"));
      } else {
        drawLine(it.ax, it.ay, it.bx, it.by, colorFor(it.type), it.label);
      }
    });

    if (pendingPoint) {
      ctx.fillStyle = colorFor(tool);
      ctx.beginPath();
      ctx.arc(pendingPoint.x, pendingPoint.y, 6, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function colorFor(type) {
    var css = getComputedStyle(document.documentElement);
    if (type === "calibrate") return css.getPropertyValue("--calib").trim() || "#2f7a52";
    if (type === "note") return css.getPropertyValue("--note").trim() || "#2a5c8a";
    return css.getPropertyValue("--measure").trim() || "#c0392b";
  }

  function drawLine(ax, ay, bx, by, color, label) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = Math.max(2, canvas.width / 500);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
    [[ax, ay], [bx, by]].forEach(function (p) {
      ctx.beginPath();
      ctx.arc(p[0], p[1], 5, 0, Math.PI * 2);
      ctx.fill();
    });
    var midx = (ax + bx) / 2, midy = (ay + by) / 2;
    var fontSize = Math.max(14, canvas.width / 80);
    ctx.font = "600 " + fontSize + "px 'Cascadia Code', Consolas, monospace";
    var textW = ctx.measureText(label).width;
    ctx.fillStyle = "rgba(0,0,0,0.72)";
    ctx.fillRect(midx - textW / 2 - 6, midy - fontSize, textW + 12, fontSize + 8);
    ctx.fillStyle = "#ffffff";
    ctx.fillText(label, midx - textW / 2, midy - 4);
    ctx.restore();
  }

  function drawPin(x, y, label, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.stroke();
    var fontSize = Math.max(14, canvas.width / 80);
    ctx.font = "600 " + fontSize + "px 'Segoe UI', sans-serif";
    var textW = ctx.measureText(label).width;
    ctx.fillStyle = "rgba(0,0,0,0.72)";
    ctx.fillRect(x + 10, y - fontSize, textW + 12, fontSize + 8);
    ctx.fillStyle = "#ffffff";
    ctx.fillText(label, x + 16, y - 4);
    ctx.restore();
  }

  function canvasPoint(evt) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    return {
      x: (evt.clientX - rect.left) * scaleX,
      y: (evt.clientY - rect.top) * scaleY
    };
  }

  canvas.addEventListener("click", function (evt) {
    var p = canvasPoint(evt);

    if (tool === "note") {
      openNotePopup(evt.clientX, evt.clientY, p);
      return;
    }

    if (!pendingPoint) {
      pendingPoint = p;
      draw();
      return;
    }

    var a = pendingPoint;
    var b = p;
    pendingPoint = null;
    var px = dist(a.x, a.y, b.x, b.y);

    if (tool === "calibrate") {
      var known = parseFloat(knownLenInput.value);
      if (!known || known <= 0) { alert("Enter a known length in mm first."); draw(); return; }
      mmPerPx = known / px;
      updateCalibPill();
      items.push({
        id: idSeq++, type: "calibrate", ax: a.x, ay: a.y, bx: b.x, by: b.y,
        pxLen: px, mmLen: known, label: known.toFixed(0) + " mm (ref)"
      });
    } else {
      var mm = mmPerPx ? px * mmPerPx : null;
      var label = mm ? mm.toFixed(0) + " mm" : px.toFixed(0) + " px";
      items.push({
        id: idSeq++, type: "measure", ax: a.x, ay: a.y, bx: b.x, by: b.y,
        pxLen: px, mmLen: mm, label: label
      });
    }
    draw();
    renderList();
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") { pendingPoint = null; draw(); }
  });

  function openNotePopup(clientX, clientY, canvasP) {
    var existing = document.querySelector(".note-popup");
    if (existing) existing.remove();
    var popup = document.createElement("div");
    popup.className = "note-popup";
    var stageRect = wrap.getBoundingClientRect();
    popup.style.left = (clientX - stageRect.left + 10) + "px";
    popup.style.top = (clientY - stageRect.top + 10) + "px";

    var input = document.createElement("input");
    input.type = "text";
    input.placeholder = "Note text…";
    var ok = document.createElement("button");
    ok.textContent = "Add";
    ok.className = "primary";

    function commit() {
      var text = input.value.trim();
      if (text) {
        items.push({ id: idSeq++, type: "note", ax: canvasP.x, ay: canvasP.y, label: text, text: text });
        draw();
        renderList();
      }
      popup.remove();
    }
    ok.addEventListener("click", commit);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") commit();
      if (e.key === "Escape") popup.remove();
    });

    popup.appendChild(input);
    popup.appendChild(ok);
    wrap.appendChild(popup);
    input.focus();
  }

  function renderList() {
    list.innerHTML = "";
    itemCount.textContent = items.length;
    if (items.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Nothing measured yet. Pick a tool on the left, then click two points on the image (or one, for a note).";
      list.appendChild(empty);
      return;
    }
    items.forEach(function (it, idx) {
      var row = document.createElement("div");
      row.className = "item";

      var top = document.createElement("div");
      top.className = "top-row";
      var sw = document.createElement("span");
      sw.className = "swatch";
      sw.style.background = colorFor(it.type);
      var lbl = document.createElement("span");
      lbl.className = "label";
      lbl.textContent = (it.type === "calibrate" ? "Calibration" : it.type === "note" ? "Note" : "Measurement") + " #" + (idx + 1);
      var del = document.createElement("button");
      del.className = "del";
      del.setAttribute("aria-label", "Delete");
      del.textContent = "✕";
      del.addEventListener("click", function () {
        var removed = items.splice(idx, 1)[0];
        if (removed.type === "calibrate") {
          var lastCalib = items.filter(function (i) { return i.type === "calibrate"; }).pop();
          mmPerPx = lastCalib ? lastCalib.mmLen / lastCalib.pxLen : null;
          updateCalibPill();
        }
        draw();
        renderList();
      });
      top.appendChild(sw); top.appendChild(lbl); top.appendChild(del);

      row.appendChild(top);

      if (it.type === "note") {
        var t = document.createElement("div");
        t.className = "note-text";
        t.textContent = it.text;
        row.appendChild(t);
      } else {
        var val = document.createElement("div");
        val.className = "val";
        val.textContent = it.pxLen.toFixed(1) + " px" + (it.mmLen ? "  →  " + it.mmLen.toFixed(1) + " mm" : "");
        row.appendChild(val);
      }
      list.appendChild(row);
    });
  }

  document.getElementById("undoBtn").addEventListener("click", function () {
    if (!items.length) return;
    var removed = items.pop();
    if (removed.type === "calibrate") {
      var lastCalib = items.filter(function (i) { return i.type === "calibrate"; }).pop();
      mmPerPx = lastCalib ? lastCalib.mmLen / lastCalib.pxLen : null;
      updateCalibPill();
    }
    draw();
    renderList();
  });
  document.getElementById("clearBtn").addEventListener("click", function () {
    if (!confirm("Clear all lines and notes?")) return;
    items = []; mmPerPx = null; pendingPoint = null;
    updateCalibPill(); draw(); renderList();
  });

  setTool("measure");
  loadImage(DEFAULT_IMAGE);
  renderList();
})();
</script>
