# plc_vision.yaml — configuration for plc_vision_app.py
#
# NOTE: PLC not on the network yet — set plc.ip once it is connected.
# Until then run:  python plc_vision_app.py --no-plc

plc:
  ip: "192.168.2.50"        # TODO: real PLC IP once connected
  rack: 0                   # S7-1200: always 0
  slot: 1                   # S7-1200: always 1
  db_number: 10             # shared DB — see PLC_DB_LAYOUT.md
  poll_interval_s: 0.05
  reconnect_delay_s: 3.0

camera:
  # Overridden by env var CAM_RIGHT_RTSP_URL if set (keeps credentials out of git)
  rtsp_url: "rtsp://root:CHANGE_ME@169.254.9.152/live1s1.sdp"

measurement:
  roi: null                 # [x, y, w, h] band where the board sits; null = full frame
  mm_per_px: 3.5            # TODO: calibrate! run: python measure_offline.py <image> --calibrate 6700
  mm_per_px_y: null         # null = same as mm_per_px
  origin_px_x: 0            # pixel x (inside ROI) of machine position 0.0 m (saw 0)
  flip_x: false             # true if machine 0.0 is on the RIGHT side of the image
  threshold: otsu           # "otsu" or a fixed 0-255 value
  board_is_light: true      # wood lighter than deck background
  blur_ksize: 5
  min_board_area_px: 5000
  min_width_ratio: 0.6      # column is "good wood" if >= 60% of body width
  gap_tolerance_px: 15      # bridge small gaps (knots/shadows) in the good run

saws:
  # Machine positions in metres, one per saw. Bit i of wSawWord = saw i.
  # For now the PLC maps these bits to discrete outputs.
  positions_m: [0.0, 0.6, 0.9, 3.0, 3.6, 4.2, 4.8, 5.4, 6.0, 6.6]

storage:
  base_path: "./captures/plc_vision"
  jpg_quality: 95
  save_annotated: true      # also save the measurement overlay image
