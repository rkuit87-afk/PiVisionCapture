<!DOCTYPE html>
<html>
<head>
    <title>PiVisionCapture - Origin Side Live</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            font-family: system-ui, -apple-system, sans-serif;
            color: #fff;
        }
        .container {
            max-width: 1920px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 24px;
        }
        .status {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #888;
        }
        #camera {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            background: #000;
            border: 2px solid #333;
        }
        .error {
            color: #f44;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Origin Side Camera (Left)</h1>
        <div class="status" id="status">Loading...</div>
        <img id="camera" src="" alt="Loading camera feed...">
    </div>

    <script>
        const API_BASE = 'http://192.168.2.11:8000';
        const statusEl = document.getElementById('status');
        const cameraEl = document.getElementById('camera');
        let frameCount = 0;
        let lastUpdate = Date.now();

        async function captureFrame() {
            try {
                const response = await fetch(API_BASE + '/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        board_id: 'live_preview',
                        base_path: '/tmp/live_capture'
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    const imgPath = data.file;
                    // Force refresh by adding timestamp
                    cameraEl.src = `file:///${imgPath}?t=${Date.now()}`;
                    frameCount++;
                    const fps = (frameCount / ((Date.now() - lastUpdate) / 1000)).toFixed(1);
                    statusEl.textContent = `✓ Live - Frame ${frameCount} (${fps} fps)`;
                    statusEl.style.color = '#4f4';
                } else {
                    statusEl.textContent = '⚠ API error: ' + response.status;
                    statusEl.style.color = '#fa4';
                }
            } catch (err) {
                statusEl.textContent = '✗ Connection error: ' + err.message;
                statusEl.style.color = '#f44';
            }
        }

        // Capture every 500ms for ~2 fps
        setInterval(captureFrame, 500);
        captureFrame(); // Start immediately
    </script>
</body>
</html>
