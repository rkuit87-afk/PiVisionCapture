<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Arkanoid</title>
    <link rel="stylesheet" href="arkanoid.css">
</head>
<body>
    <h1>Arkanoid</h1>
    <div class="game-container">
        <div class="main-content">
            <canvas id="game-canvas" width="800" height="600"></canvas>
            <div id="message-screen" class="message-screen">
                <div id="message-text"></div>
                <button id="play-again">Play Again</button>
            </div>
        </div>
        <div class="sidebar">
            <div>
                <h2>SCORE</h2>
                <p id="score">0</p>
            </div>
            <div>
                <h2>LIVES</h2>
                <p id="lives">3</p>
            </div>
            <h2>INSTRUCTIONS</h2>
            <p>Move mouse to control paddle</p>
        </div>
    </div>
    <script src="arkanoid.js"></script>
</body>
</html>
